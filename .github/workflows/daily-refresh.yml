name: Daily Intelligence Refresh

on:
  schedule:
    # 07:00 IST = 01:30 UTC
    - cron: '30 1 * * *'
  workflow_dispatch:   # also allow manual trigger from GitHub UI

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate fresh index.html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit and push updated page
        run: |
          git config user.name  "Intelligence Bot"
          git config user.email "bot@electrolyte-intelligence"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add index.html
          git diff --staged --quiet || git commit -m "Daily refresh: $(date +'%Y-%m-%d %H:%M IST')"
          git push
